<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    font-family: Arial;
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #14a800;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #14a800;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #108a00;
}

#message {
    text-align: center;
    margin-top: 10px;
}

.signup-link {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.signup-link a {
    color: #14a800;
    text-decoration: none;
}

.signup-link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="message"></p>

    <div class="signup-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwhp7cNPCwi827day8Zba6o2NT6DPtam6IKzJUTKZUKKoBgZ1QhwBARrwF7KKgWFXt5/exec";

function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    msg.innerText = "";

    if (!email || !password) {
        msg.style.color = "red";
        msg.innerText = "Please fill all fields";
        return;
    }

    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            action: "login",
            email,
            password
        })
    })
    .then(res => res.json())
    .then(data => {
        msg.innerText = data.message;

        if (data.status === "success") {
            msg.style.color = "green";

            // Save user
            localStorage.setItem("userName", data.name);

            // Redirect
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);

        } else {
            msg.style.color = "red";
        }
    })
    .catch(err => {
        msg.innerText = "Server error";
        msg.style.color = "red";
    });
}
</script>

</body>
</html>
