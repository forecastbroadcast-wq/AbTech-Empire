<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- Google Sign-In -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body {
    font-family: Arial;
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
    color: #14a800;
}
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
}
button {
    width: 100%;
    padding: 10px;
    background: #14a800;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background: #108a00;
}
#message {
    text-align: center;
    margin-top: 10px;
}
.signup-link {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}
.signup-link a {
    color: #14a800;
    text-decoration: none;
}
.signup-link a:hover {
    text-decoration: underline;
}

.g_id_signin {
    margin-top: 15px;
    display: flex;
    justify-content: center;
}
</style>
</head>

<body>
<div class="container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <!-- Google Login -->
    <div id="g_id_onload"
         data-client_id="199001016921-cs3jr034oi9e3spb5klvulsgbgpns0nf.apps.googleusercontent.com"
         data-callback="handleGoogleLogin">
    </div>

    <div class="g_id_signin"></div>

    <p id="message"></p>

    <div class="signup-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyFLFmLXLLuSBy9jNkhPgjp0uE8xXO6sS9Dm_nUd4mVKmrRCCGknihnKWhjBqilwtya/exec";

function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("message");

    msg.innerText = "";
    msg.style.color = "black";

    if (!email || !password) {
        msg.style.color = "red";
        msg.innerText = "Please fill all fields";
        return;
    }

    const formData = new FormData();
    formData.append("action", "login");
    formData.append("email", email);
    formData.append("password", password);

    fetch(API_URL, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        msg.innerText = data.message;
        msg.style.color = data.status === "success" ? "green" : "red";

        if (data.status === "success") {
            localStorage.setItem("userName", data.name);
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        }
    });
}

/* Google Login */
function handleGoogleLogin(response) {
    const data = parseJwt(response.credential);

    const formData = new FormData();
    formData.append("action", "googleLogin");
    formData.append("name", data.name);
    formData.append("email", data.email);

    fetch(API_URL, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {
            localStorage.setItem("userName", data.name);
            window.location.href = "dashboard.html";
        }
    });
}

function parseJwt(token) {
    let base64Url = token.split('.')[1];
    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    let jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(jsonPayload);
}
</script>
</body>
</html>
